name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 혹은 master (사용하는 기본 브랜치 이름에 맞게 수정 가능)

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          npm ci
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite의 기본 빌드 출력 폴더
          branch: gh-pages # 배포될 브랜치
